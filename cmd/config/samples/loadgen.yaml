---
# The gRPC endpoint where the load generator exposes its full API for
# programmatic control of load generation. Optional: if not set, no gRPC endpoint is exposed.
server:
  endpoint: :8001
  tls: &tlsConfig
    # TLS mode for server connections: 'none' (no TLS), 'tls' (server auth only),
    # or 'mtls' (mutual TLS with client cert verification).
    mode: mtls
    # Path to the server's TLS certificate file (public key).
    cert-path: /root/artifacts/peerOrganizations/peer-org-0.com/peers/loadgen/tls/server.crt
    # Path to the server's TLS private key file.
    key-path: /root/artifacts/peerOrganizations/peer-org-0.com/peers/loadgen/tls/server.key
    # List of paths to CA certificate files for verifying client certificates (required for mtls).
    ca-cert-paths:
      - /root/artifacts/peerOrganizations/peer-org-0.com/msp/tlscacerts/tlspeer-org-0-CA-cert.pem
# Monitoring endpoint configuration (Prometheus metrics at /metrics and pprof profiling at /debug/pprof/).
# The HTTP endpoint for runtime rate limit adjustments.
# It also exposes the following API:
# GET  /getRateLimit - Get the rate limit returning a JSON body { "rate": uint64 }.
# POST /setRateLimit - Sets the rate limit using a JSON body { "rate": uint64 }.
monitoring:
  # The endpoint where Prometheus metrics and pprof profiling are exposed.
  # Format: host:port or :port (binds to all interfaces).
  # Monitoring TLS configuration should/could be different from the GRPC server TLS
  # to only allow authorized admins to monitor the service's metrics.
  endpoint: :2118
  tls: *tlsConfig
  # Rate limiting configuration for unary gRPC endpoints.
  # Uses a token bucket algorithm to limit the number of requests per second.
  rate-limit:
    # Maximum number of requests per second allowed.
    # Set to 0 to disable rate limiting.
    requests-per-second: 0
    # Maximum number of requests allowed in a single burst.
    # When rate limiting is enabled (requests-per-second > 0):
    #   - Must be greater than 0
    #   - Must be less than or equal to requests-per-second
    burst: 0
  # Latency tracking configuration for measuring transaction processing times.
  latency:
    # Maximal number of TX entries to hold in memory when tracking TXs latency.
    # This size will be pre-allocated (~1 MB for 10,000 entries), thus it is important
    # to use a sensible value. Hash collisions may cause some measurements to be lost
    # if this value is too small relative to the sampling rate. Recommended: 10,000 for
    # 1-10% sampling rates.
    max-tracked-txs: 10_000
    sampler:
      # Portion of transactions to sample for latency measurement (0.0 to 1.0).
      # Lower values reduce overhead but may miss outliers. 0.01 = 1% sampling.
      # Used when prefix is not set.
      portion: 0.01
      # Prefix to filter transactions for latency sampling. Only transactions with keys
      # starting with this prefix will be sampled. Leave empty or comment out to use portion-based sampling.
      # prefix: TX_ID_PREFIX
    buckets:
      # Distribution type for latency histogram buckets:
      #   'uniform' - Equal width buckets from 0 to max-latency
      #   'exponential' - Exponentially increasing bucket widths
      #   'fixed' - Custom bucket boundaries specified in 'values' field
      distribution: uniform
      # Maximum latency value to track. Latencies above this are counted in overflow bucket.
      # Used with 'uniform' and 'exponential' distributions. Ignored when distribution is 'fixed'.
      max-latency: 5s
      # Number of histogram buckets for latency distribution analysis.
      # Used with 'uniform' and 'exponential' distributions. Ignored when distribution is 'fixed'.
      bucket-count: 1000
      # Custom bucket boundaries in seconds. Only used when distribution is 'fixed'.
      # Example: [0.001, 0.01, 0.1, 1.0, 5.0] creates buckets for <1ms, 1-10ms, 10-100ms, 100ms-1s, 1-5s, >5s
      # values: [0.001, 0.01, 0.1, 1.0, 5.0]

# Orderer client configuration for submitting transactions
orderer-client:
  # Sidecar client configuration (alternative to direct orderer connection)
  sidecar-client:
    # Endpoint of the sidecar service to connect to for block delivery.
    # Format: host:port.
    endpoint: sidecar:4001
    # TLS mode for sidecar client connections: 'none' (no TLS), 'tls' (server auth only),
    # or 'mtls' (mutual TLS with client cert verification).
    tls: *tlsConfig
  # Direct orderer connection configuration (alternative to sidecar-client)
  orderer:
    # Fault tolerance level of the ordering service: 'BFT' (Byzantine Fault Tolerant) or 'CFT'.
    # Affects how the loadgen interacts with the orderer.
    fault-tolerance-level: BFT
    # Path to the latest known config block file, used to obtain the latest endpoints and TLS credentials
    # of the Orderer parties.
    latest-known-config-block-path: /root/artifacts/config-block.pb.bin
    # Loadgen uses these TLS credentials when connecting to the orderers as a client.
    tls: *tlsConfig
    # Identity configuration for signing transactions and connecting to orderers.
    identity:
      # MSP (Membership Service Provider) ID identifying the organization.
      msp-id: peer-org-0
      # Path to the MSP directory containing certificates and keys.
      # Standard Fabric MSP structure with signcerts/, keystore/, cacerts/, etc.
      msp-dir: /root/artifacts/peerOrganizations/peer-org-0.com/users/client@peer-org-0.com/msp
      # BCCSP (Blockchain Crypto Service Provider) configuration for cryptographic operations.
      bccsp:
        # Default crypto provider: 'SW' (software) or 'PKCS11' (hardware security module).
        Default: SW
        SW:
          # Security level in bits (256 for ECDSA P-256, 384 for P-384).
          Security: 256
          # Hash algorithm: 'SHA2' or 'SHA3'.
          Hash: SHA2
  # Number of parallel goroutines for broadcasting transactions to the orderer.
  # Higher values increase throughput but consume more resources.
  # We set low values to reduce the CPU load during tests.
  broadcast-parallelism: 1

# Load profile configuration defining transaction characteristics and generation parameters
load-profile:
  # block describes generate block characteristics
  # (when applying load to the VC or Verifier, blocks are translated to batches).
  # The generated block size is aimed to be max-size, if the generated
  # TXs rate is sufficient.
  # If the generated TXs rate is too low, the block size might
  # be less than max-size, but at least min-size.
  # In such case, the block is generated at a preferred rate of preferred-rate.
  # Blocks wait up to preferred-rate (default: 1 second) before submission.
  # If a full block is not ready by then, a partial block is
  # submitted if it meets min-size (default: 1);
  # otherwise, the system waits until min-size is available.
  # If the max-size is less than or equal to min-size, preferred-rate is ignored.
  block:
    max-size: 500
    min-size: 10
    preferred-rate: 1s
  # Transaction structure configuration.
  # Each transaction can contain three types of key operations:
  #   - read-only: Reads a key without writing (version is nil).
  #   - read-write: Reads and writes a key (read version is nil).
  #   - blind-write (write-count): Writes a key without reading it first.
  # The count for each type is a fixed number of operations per transaction (default: 0).
  transaction:
    # Size of generated keys in bytes. Affects transaction payload size and storage requirements.
    key-size: 32
    # Size in bytes of the value written for each read-write operation (0 means nil value).
    # read-write-value-size: 0
    # Size in bytes of the value written for each blind-write operation (0 means nil value).
    # blind-write-value-size: 0
    # Size in bytes of the metadata for each transaction (0 means nil value).
    # metadata-size: 0
    # Number of read-only operations per transaction.
    # read-only-count: 0
    # Number of read-write operations per transaction.
    read-write-count: 2
    # Number of blind-write operations per transaction.
    # write-count: 0
    # Fraction of transactions to generate with invalid signatures (0.0 to 1.0), for testing
    # signature verification and error handling. 0.1 = 10% invalid. The decision is derived
    # deterministically from the transaction index.
    invalid-signatures: 0.1
    #
    # By DEFAULT (new-keys-rate UNSET) every slot uses a fresh, unique key, generating
    # contention-free workload. SETTING new-keys-rate (to any value >= 0) enables the split, letting keys
    # be REUSED across transactions and producing the commit-time contention the coordinator must order.
    #
    # Reads and writes share ONE key space, and a key is only ever CREATED by a WRITE slot:
    #   - A READ-WRITE slot that targets a not-yet-created key is the canonical CHECKED INSERT: its
    #     nil-version read asserts the key does not exist, then the write creates it. Read-write slots
    #     take the creates first. A conflict here (a concurrent creator) is measured contention, but may
    #     waste a key — taken out of the queue but never written.
    #   - A READ-ONLY slot NEVER creates; pointing it at a not-yet-created key would "waste" that key
    #     (read forever as nil). So every read-only slot references an ALREADY-CREATED key.
    # Forward references (a read of a key a later write creates) are NOT synthesized: the orderer and the
    # parallel workers reorder transactions, so backward references near the frontier become forward
    # references for free — a backward window at distance `reference-gap` is statistically the same as
    # looking forward AND backward at gap/2.
    #
    # Average number of NEW committable keys created per transaction by the write slots. The committable
    # frontier grows as floor(j * new-keys-rate) after j transactions; flooring keeps the per-transaction
    # count deterministic. The first floor((j+1)*rate)-floor(j*rate) write slots create; every remaining
    # write slot and every read-only slot references an already-created key. UNSET (default) DISABLES the
    # split (every slot is a fresh unique key). A value of 0 means NO creates at all (every slot
    # references the static pre-genesis working set). A positive value must not exceed the write-slot
    # count (read-write-count + write-count). To keep read-writes doing checked inserts rather than
    # forcing blind-write overflow, keep new-keys-rate <= write-count.
    # new-keys-rate: 1
    # Minimum transaction distance behind the current transaction from which existing references are
    # drawn: at transaction j the reference window ends at the frontier as of j-gap. 0 (default)
    # references the newest keys (in-flight, highest contention); larger values reference older, already-
    # committed keys. Expressed in TRANSACTIONS (a distance), not keys. Ignored when new-keys-rate unset.
    # reference-gap: 0
    # Size, IN KEYS, of the moving working set an existing reference is drawn from (references land in
    # [top-window, top), spread by a per-transaction random offset). A larger window spreads references
    # over more keys (less contention); a smaller one concentrates them (more contention). Required to be
    # at least the total slot count (read-only + read-write + write) when new-keys-rate is set, so all
    # references within a transaction are distinct. Ignored when new-keys-rate is unset.
    # lookback-window: 1024
  # Policy configuration for transaction endorsement and validation
  policy:
    # Channel ID for which transactions are generated. Must match the target blockchain channel.
    channel-id: mychannel
    # Namespace-specific endorsement policies. Key is namespace ID (0 for default namespace).
    # Each namespace can have different signature schemes and endorsement requirements.
    # System namespaces (meta and config) must not be specified; their policies are derived
    # from the config block automatically.
    #
    # Supported schemes:
    #   MSP (default)     - Uses Fabric's standard endorsement with signing identities.
    #                        If 'msp-identities' is provided, they will be used for endorsement.
    #                        Otherwise, they are loaded from 'artifacts-path'.
    #                        It requires all provided identities to sign (all peer organizations
    #                        if loaded form the 'artifacts-path').
    #                        The 'seed' and 'key-path' fields are ignored when using MSP.
    #   ECDSA, EDDSA, BLS - Use synthetic identities generated from 'seed' (or loaded from 'key-path').
    #                        No Fabric PKI required. Useful for performance testing.
    #                        The 'msp-identities' field is ignored when using these.
    namespace-policies:
      # Example: MSP-based endorsement (requires 'artifacts-path' with crypto materials).
      0:
        scheme: MSP
      #  msp-identities:  # Optional: load signing identities from local MSP instead of loading from 'artifacts-path'.
      #    - msp-id: peer-org-0
      #      msp-dir: /root/artifacts/peerOrganizations/peer-org-0.com/users/client@peer-org-0.com/msp
      #    - msp-id: peer-org-1
      #      msp-dir: /root/artifacts/peerOrganizations/peer-org-1.com/users/client@peer-org-1.com/msp
      # Example: synthetic ECDSA signatures (no Fabric PKI needed).
      1:
        scheme: ECDSA
        # Random seed for generating synthetic identities. Ensures reproducible key generation.
        seed: 10
        # key-path:  # Optional: load keys from files instead of generating from seed.
        #   signing-key: /path/to/signing.key
        #   verification-key: /path/to/verification.key
        #   sign-certificate: /path/to/cert.pem
    # Orderer endpoint specifications for transaction submission.
    # Format: id=<num>,broadcast,deliver,<host>:<port>
    # Capabilities: 'broadcast' (submit txs), 'deliver' (receive blocks).
    orderer-endpoints:
      - id=0,broadcast,deliver,orderer:7050
    # peer-organization-count specifies how many peer organizations to generate.
    # Required for MSP-based lifecycle endorsement policies on the meta namespace.
    peer-organization-count: 2
    # artifacts-path may specify the path to the artifacts generated by `loadgen make-artifacts`.
    # If this field is empty, the artifacts will be generated into a temporary folder,
    # which will be printed by the loadgen CLI tool.
    # If this path does not exist, or it is empty, the artifacts will be generated into it.
    artifacts-path: /root/artifacts
  # Random seed for reproducible transaction generation. Same seed produces same transaction sequence.
  seed: 12345
  # Number of worker goroutines for parallel transaction generation.
  # Higher values increase generation throughput but consume more CPU.
  # We set low values to reduce the CPU load during tests.
  workers: 1

stream:
  # Maximum number of transactions per second that the load generator will produce.
  # Set to 0 for unlimited rate. This directly controls the transaction generation throughput.
  rate-limit: 10_000
  # Size of internal channel buffers used in the transaction generation pipeline.
  # Larger buffers mask performance fluctuations and improve throughput but increase
  # memory usage and latency. We set low values to reduce the CPU load during tests.
  buffers-size: 10
  # Number of transactions generated in each batch by worker goroutines before
  # inserting into channels. Batching helps overcome Go channel rate limitations.
  # Larger batches improve efficiency but may increase latency variance.
  gen-batch: 10

generate:
  # Controls whether the loadgen generates a config transaction during the config phase.
  # When false, the config transaction is expected to be submitted outside the loadgen.
  # Ignored by the coordinator, VC, and verifier adapters.
  config: false
  # Controls whether to generate namespace creation transactions during the namespaces phase.
  # Required for new deployments to set up the namespace structure before generating regular load.
  namespaces: true
  # Controls whether to generate regular transaction load during the load phase.
  # Can be disabled if only namespace setup or config updates are needed.
  load: true

# The stopping condition for generating load according to the collected metrics.
# Zero value indicate no limit.
# The limit on the number of TXs is applied at block granularity. I.e., more TXs might be created than expected
# if a block overshot.
# The load generator stops when both requirements are met, i.e., one of them might overshoot.
# For the orderer adapter, the blocks limit is ignored for broadcasting as we don't track submitted blocks.
# For adapters that use concurrent submitters, we cannot enforce exact limits.
# The sidecar and coordinator adapters are sequential, so they don't have these issues.
limit:
  blocks: 0
  transactions: 50_000

# Logging configuration
logging:
  # Log level specification. Can be a single level (e.g., "info", "debug") or
  # module-specific levels (e.g., "info,loadgen=debug").
  # Valid levels: debug, info, warning, error, panic, fatal.
  logSpec: info:grpc=error
  # Log message format template. Supports color codes, timestamps, module names,
  # function names, and log levels. See fabric-lib-go/common/flogging for details.
  format: >-
    %{color}%{time:2006-01-02 15:04:05.000 MST} [%{module}] %{shortfunc}
    -> %{level:.4s}%{color:reset} %{message}
