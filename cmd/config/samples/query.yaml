---
# Configuration for the server
server:
  # The gRPC endpoint where the query service listens for state query requests from clients.
  # Format: host:port or :port (binds to all interfaces).
  endpoint: :7001
  tls: &tlsConfig
    # TLS mode for server connections: 'none' (no TLS), 'tls' (server auth only),
    # or 'mtls' (mutual TLS with client cert verification).
    mode: mtls
    # Path to the server's TLS certificate file (public key).
    cert-path: /root/artifacts/peerOrganizations/peer-org-0/peers/query/tls/server.crt
    # Path to the server's TLS private key file.
    key-path: /root/artifacts/peerOrganizations/peer-org-0/peers/query/tls/server.key
    # List of paths to CA certificate files for verifying client certificates (required for mtls).
    ca-cert-paths:
      - /root/artifacts/peerOrganizations/peer-org-0/msp/tlscacerts/tlspeer-org-0-CA-cert.pem
  # Rate limiting configuration for unary gRPC endpoints.
  # Uses a token bucket algorithm to limit the number of requests per second.
  rate-limit:
    # Maximum number of requests per second allowed.
    # Set to 0 to disable rate limiting.
    requests-per-second: 0
    # Maximum number of requests allowed in a single burst.
    # When rate limiting is enabled (requests-per-second > 0):
    #   - Must be greater than 0
    #   - Must be less than or equal to requests-per-second
    burst: 0
# Monitoring endpoint configuration (Prometheus metrics at /metrics and pprof profiling at /debug/pprof/).
monitoring:
  # The endpoint where Prometheus metrics and pprof profiling are exposed.
  # Format: host:port or :port (binds to all interfaces).
  endpoint: :2117
  # Monitoring TLS configuration should/could be different from the GRPC server TLS
  # to only allow authorized admins to monitor the service's metrics.
  tls: *tlsConfig
  rate-limit:
    requests-per-second: 0
    burst: 0

# Database connection configuration
database:
  # List of database endpoints to connect to. Multiple endpoints can be specified
  # for YugabyteDB clusters or PostgreSQL replicas. Format: host:port for each endpoint.
  endpoints:
    - db:5433
  # Database username for authentication.
  username: "yugabyte"
  # Database password for authentication.
  # TODO: pass password via environment variable for better security.
  password: "yugabyte"
  # Database name to connect to.
  database: "yugabyte"
  tls:
    # TLS mode for database connections: 'none' (no TLS) or 'tls' (server auth with CA verification).
    # Note: Database connections do not support mutual TLS (mtls).
    mode: tls
    # Path to the CA certificate file for verifying the database server's certificate.
    ca-cert-path: /root/artifacts/peerOrganizations/peer-org-0/msp/tlscacerts/tlspeer-org-0-CA-cert.pem
  # Maximum size of the database connection pool. Limits concurrent database operations.
  # Should be tuned based on database capacity and expected query load.
  max-connections: 10
  # Minimum size of the database connection pool. Keeps connections warm for faster queries.
  # Should be less than or equal to max-connections.
  min-connections: 5
  # Enable load balancing across multiple database endpoints. Should be enabled for
  # YugabyteDB clusters to distribute queries across nodes. Set to false for single-node deployments.
  load-balance: false
  retry:  # The exponential backoff retry strategy for database operation.
    # This strategy increases the delay between retry attempts exponentially.
    # When using YugabyteDB as the backend, it is needed to handle retryable errors.
    # https://support.yugabyte.com/hc/en-us/articles/
    # 4409627048461-How-to-Troubleshoot-Database-Transaction-Retryable-Errors

    # initial-interval: Specifies the duration of the first backoff interval.
    # This is the time to wait before the first retry attempt.
    # Format: string representing a duration (e.g., "500ms", "1s", "2.5s").
    initial-interval: 500ms

    # randomization-factor: Controls the amount of randomness (jitter) applied to each backoff interval.
    # The actual backoff duration for an attempt will be randomly selected from the range:
    # [current_interval * (1 - randomization_factor), current_interval * (1 + randomization_factor)]
    # A factor of 0 means no randomization. A factor of 0.5 means the actual interval
    # can vary by +/- 50% of the calculated interval.
    # Must be between 0 and 1.
    randomization-factor: 0.5

    # multiplier: The factor by which the backoff interval increases after each failed attempt.
    # The next interval (before randomization) is calculated as: current_interval * multiplier.
    # A value of 1.5 means each subsequent interval will be 50% longer than the previous one.
    # Must be >= 1.
    multiplier: 1.5

    # max-interval: Sets the absolute maximum duration for any single backoff interval.
    # Even if the calculated interval (initial_interval * multiplier^n) exceeds this value,
    # the interval used (before randomization) will be capped at max-interval.
    # Format: string representing a duration (e.g., "60s", "1m", "5m").
    max-interval: 60s

    # max-elapsed-time: The maximum total time allowed for retries since the operation first began.
    # If the total time spent (including execution time of attempts and backoff waits)
    # exceeds this duration, the retry mechanism will stop, even if other limits haven't been reached.
    # Setting this to "0" means there is no time limit, and retries will continue
    # indefinitely until successful.
    # Format: string representing a duration (e.g., "15m", "1h").
    max-elapsed-time: 15m

# Resource limit configurations.
# The following limits prevent unbounded memory growth and resource leaks.

# Minimum number of keys that must accumulate in a batch before executing the query
# against the database. Batching reduces database round-trips and improves efficiency.
# Queries wait up to max-batch-wait for the batch to fill.
min-batch-keys: 1024
# Maximum time to wait for a batch to reach min-batch-keys before executing it anyway.
# Lower values reduce query latency but may decrease batching efficiency. Queries may
# wait longer if no database connections are available.
max-batch-wait: 100ms
# Time window for aggregating multiple views with the same parameters into a single
# batched view. Views created within this window are processed together to reduce
# database load. Larger windows improve batching but increase latency.
view-aggregation-window: 100ms
# Maximum number of views that can be aggregated together. Once reached, a new
# aggregated view is created even if within the view-aggregation-window.
max-aggregated-views: 1024
# Maximum number of concurrently active (batched) views. When reached, new BeginView
# requests are rejected with RESOURCE_EXHAUSTED. Set to 0 to disable the limit.
max-active-views: 4096
# Maximum lifetime of a view from creation to completion of its last query.
# Views exceeding this timeout are aborted to prevent resource leaks.
# Includes query execution time.
max-view-timeout: 10s

# Maximum number of keys allowed in a single query request.
# This applies to both GetRows (total keys across all namespaces) and
# GetTransactionStatus (number of transaction IDs).
# Large key sets can cause high latency, memory spikes, and potential timeouts.
# Set to 0 to disable the limit (not recommended for production).
max-request-keys: 10000

# Logging configuration
logging:
  # Log level specification. Can be a single level (e.g., "info", "debug") or
  # module-specific levels (e.g., "info,query=debug").
  # Valid levels: debug, info, warning, error, panic, fatal.
  logSpec: "info"
  # Log message format template. Supports color codes, timestamps, module names,
  # function names, and log levels. See fabric-lib-go/common/flogging for details.
  format: >-
    %{color}%{time:2006-01-02 15:04:05.000 MST} [%{module}] %{shortfunc}
    -> %{level:.4s}%{color:reset} %{message}

