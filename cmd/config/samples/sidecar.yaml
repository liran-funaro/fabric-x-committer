---
# The gRPC endpoint where the sidecar service listens for block delivery requests
# and block query APIs from clients, implementing the Deliver API and notification subscriptions.
# Format: host:port or :port (binds to all interfaces).
server:
  endpoint: :4001
  tls:
    # TLS mode for server connections: 'none' (no TLS), 'tls' (server auth only),
    # or 'mtls' (mutual TLS with client cert verification).
    mode: mtls
    # Path to the server's TLS certificate file (public key).
    cert-path: /server-certs/public-key.pem
    # Path to the server's TLS private key file.
    key-path: /server-certs/private-key.pem
    # List of paths to CA certificate files for verifying client certificates (required for mtls).
    ca-cert-paths:
      - /server-certs/ca-certificate.pem
  keep-alive:
    params:
      # Duration after which the server sends a keepalive ping if no data has been
      # transmitted on the connection. Helps detect dead connections and prevent resource leaks.
      time: 300s
      # How long the server waits for a keepalive acknowledgment before closing the connection.
      # Should be longer than params.time to allow for network delays.
      timeout: 600s
    enforcement-policy:
      # Minimum time clients must wait between sending keepalive pings. Prevents clients
      # from overwhelming the server with excessive pings. Clients violating this are disconnected.
      min-time: 60s
      # Controls whether clients can send keepalive pings when no active streams exist.
      # Set to false to prevent unnecessary pings and reduce server load.
      permit-without-stream: false
  # Maximum number of concurrent streaming RPCs (Deliver + Notification) allowed per
  # client connection. Limits resource usage but may cause connection failures if clients
  # need more streams. Set to 0 for unlimited (not recommended in production).
  max-concurrent-streams: 10
  # Rate limiting configuration for unary gRPC endpoints.
  # Uses a token bucket algorithm to limit the number of requests per second.
  rate-limit:
    # Maximum number of requests per second allowed.
    # Set to 0 to disable rate limiting.
    requests-per-second: 0
    # Maximum number of requests allowed in a single burst.
    # When rate limiting is enabled (requests-per-second > 0):
    #   - Must be greater than 0
    #   - Must be less than or equal to requests-per-second
    burst: 0
# Monitoring endpoint configuration (Prometheus metrics at /metrics and pprof profiling at /debug/pprof/).
monitoring:
  # The endpoint where Prometheus metrics and pprof profiling are exposed.
  # Format: host:port or :port (binds to all interfaces).
  endpoint: :2114
  tls:
    # TLS mode for monitoring endpoint: 'none' (no TLS), 'tls' (server auth only),
    # or 'mtls' (mutual TLS with client cert verification).
    mode: mtls
    # Path to the server's TLS certificate file (public key).
    cert-path: /server-certs/public-key.pem
    # Path to the server's TLS private key file.
    key-path: /server-certs/private-key.pem
    # List of paths to CA certificate files for verifying client certificates (required for mtls).
    ca-cert-paths:
      - /server-certs/ca-certificate.pem
  rate-limit:
    requests-per-second: 0
    burst: 0

# Orderer connection configuration for fetching blocks
orderer:
  # Consensus type of the ordering service: 'BFT' (Byzantine Fault Tolerant) or 'CFT' (Crash Fault Tolerant / Raft).
  # Defaults to 'CFT' if not specified. Affects how the sidecar interacts with orderers.
  # consensus-type: CFT
  # The channel ID from which to fetch blocks.
  channel-id: mychannel
  # Organizations map organization MSP IDs to their orderer connection details.
  # It supports multi-organization deployments where each org has its own orderers and TLS root CAs.
  # Each organization can have multiple orderer endpoints with different capabilities (broadcast, deliver).
  organizations:
    org0:
      endpoints:
        - id=0,broadcast,deliver,orderer:7050
      # List of paths to CA certificate files for verifying orderer certificates.
      # Each organization can have its own CA certificates.
      ca-cert-paths:
        - /client-certs/ca-certificate.pem
  # Sidecar uses these TLS credentials when connecting to the orderers as a client.
  tls:
    # TLS mode for orderer client connections: 'none' (no TLS), 'tls' (server auth only),
    # or 'mtls' (mutual TLS with client cert verification).
    mode: mtls
    # Path to the client's TLS certificate file (public key) for authentication.
    cert-path: /client-certs/public-key.pem
    # Path to the client's TLS private key file.
    key-path: /client-certs/private-key.pem
    # List of common CA certificate paths used across all orderer organizations.
    # These are in addition to organization-specific CA certificates.
    common-ca-cert-paths:
      - /client-certs/ca-certificate.pem
  # reconnect:  # Optional exponential backoff retry for orderer gRPC reconnections.
  #   initial-interval: 500ms
  #   randomization-factor: 0.5
  #   multiplier: 1.5
  #   max-interval: 10s
  #   max-elapsed-time: 15m
  # Identity configuration for authenticating with orderers and signing requests.
  identity:
    # MSP ID of the organization this sidecar represents.
    msp-id: peer-org-0
    # Path to the MSP directory containing certificates and keys for the identity.
    msp-dir: /root/artifacts/peerOrganizations/peer-org-0/users/client@peer-org-0.com/msp
    bccsp:
      Default: SW
      SW:
        Security: 256
        Hash: SHA2
# Coordinator (committer) connection configuration
committer:
  # Endpoint of the coordinator service to send blocks and receive transaction statuses.
  # Format: host:port.
  endpoint: coordinator:9001
  tls:
    # TLS mode for coordinator client connections: 'none' (no TLS), 'tls' (server auth only),
    # or 'mtls' (mutual TLS with client cert verification).
    mode: mtls
    # Path to the client's TLS certificate file (public key) for authentication.
    cert-path: /client-certs/public-key.pem
    # Path to the client's TLS private key file.
    key-path: /client-certs/private-key.pem
    # List of paths to CA certificate files for verifying server certificates.
    ca-cert-paths:
      - /client-certs/ca-certificate.pem
  # reconnect:  # Optional exponential backoff retry for coordinator gRPC reconnections.
  #   initial-interval: 500ms
  #   randomization-factor: 0.5
  #   multiplier: 1.5
  #   max-interval: 10s
  #   max-elapsed-time: 15m
ledger:
  # Filesystem directory where the sidecar stores the local copy of the blockchain ledger.
  # Must be persistent storage to survive restarts. The directory is created if it doesn't exist.
  path: /root/sc/ledger
  # How often the block store fsyncs to durable storage. Every Nth block triggers
  # a full sync; intermediate blocks are written without fsync. Set to 0 or 1 to
  # sync every block (safest but slowest). Higher values improve write performance
  # but risk losing more blocks on crash (recoverable from orderer).
  sync-interval: 100
notification:
  # Maximum time a client notification subscription can remain idle before being
  # automatically closed. Prevents resource leaks from abandoned subscriptions.
  # If a client doesn't specify a timeout, this value is used.
  max-timeout: 10m
  max-active-tx-ids: 100_000
  max-tx-ids-per-request: 1000

bootstrap:
  # Path to the genesis block file (config block) used to initialize the ledger on
  # first startup. Required for new deployments. If the ledger already exists,
  # this parameter is ignored.
  genesis-block-file-path: /root/artifacts/config-block.pb.bin

# How often the sidecar updates the coordinator with the last committed block number.
# More frequent updates improve coordinator accuracy for dependency resolution but
# increase network traffic and coordinator load.
last-committed-block-set-interval: 5s
# Maximum number of transactions that have been sent to the coordinator and are
# waiting for their status response. When reached, the sidecar applies backpressure
# to the orderer connection by pausing block fetching. Prevents memory exhaustion under high load.
waiting-txs-limit: 20_000_000
# Buffer size for internal Go channels used in the block processing pipeline
# (block delivery, status updates, notifications). Larger buffers improve throughput
# by reducing channel contention but increase memory usage.
channel-buffer-size: 100

# Logging configuration
logging:
  # Log level specification. Can be a single level (e.g., "info", "debug") or
  # module-specific levels (e.g., "info,sidecar=debug").
  # Valid levels: debug, info, warning, error, panic, fatal.
  logSpec: "info"
  # Log message format template. Supports color codes, timestamps, module names,
  # function names, and log levels. See fabric-lib-go/common/flogging for details.
  format: >-
    %{color}%{time:2006-01-02 15:04:05.000 MST} [%{module}] %{shortfunc}
    -> %{level:.4s}%{color:reset} %{message}

