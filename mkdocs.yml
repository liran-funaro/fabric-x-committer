---
site_name: Fabric-X Committer
site_description: High-throughput transaction validation and commit for Hyperledger Fabric-X
site_url: https://hyperledger.github.io/fabric-x-committer/
repo_url: https://github.com/hyperledger/fabric-x-committer
repo_name: hyperledger/fabric-x-committer

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - admonition
  - pymdownx.details
  - toc:
      permalink: true
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Getting Started: setup.md
  - CLI Reference:
      - committer: cli/committer.md
  - Architecture: architecture.md
  - Deployment:
      - Deployment Guide: deployment-guide.md
      - Performance Tuning: performance-tuning.md
  - Services:
      - Sidecar: sidecar.md
      - Coordinator: coordinator.md
      - Verifier: verification-service.md
      - Validator-Committer: validator-committer.md
      - Query Service: query-service.md
      - Notification Service: notification-service.md
  - Configuration:
      - TLS: tls-configurations.md
      - Logging: logging.md
      - Metrics Reference: metrics_reference.md
      - Namespace Policy: namespace-policy.md
  - Development:
      - Core Concurrency Pattern: core-concurrency-pattern.md
      - Load Generator Artifacts: loadgen-artifacts.md
